<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>福克斯山银行</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #e9f0f5 0%, #d3dee8 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .auth-container {
            max-width: 420px;
            width: 100%;
            background: rgba(255,255,255,0.95);
            border-radius: 32px;
            padding: 36px 28px 32px;
            box-shadow: 0 20px 40px rgba(0,20,40,0.2);
        }
        .auth-container .logo {
            text-align: center;
            margin-bottom: 8px;
        }
        .auth-container .logo svg {
            width: 64px;
            height: 64px;
        }
        .auth-container h1 {
            font-size: 26px;
            color: #1a2e3f;
            text-align: center;
            margin-bottom: 4px;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .auth-container .subhead {
            color: #3e5a6b;
            font-size: 14px;
            text-align: center;
            margin-bottom: 28px;
            opacity: 0.7;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 16px;
        }
        .input-group label {
            font-size: 13px;
            font-weight: 600;
            color: #2b4b5e;
        }
        .input-group input {
            background: white;
            border: 1px solid #cbd9e5;
            border-radius: 40px;
            padding: 14px 18px;
            font-size: 16px;
            outline: none;
            width: 100%;
        }
        .input-group input:focus {
            border-color: #3f7b9e;
            box-shadow: 0 0 0 3px rgba(63, 123, 158, 0.2);
        }
        .btn {
            border: none;
            border-radius: 60px;
            padding: 14px 24px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: 0.15s;
            width: 100%;
            text-align: center;
        }
        .btn-primary {
            background: #1a3a4a;
            color: white;
        }
        .btn-primary:active {
            transform: scale(0.96);
        }
        .btn-outline {
            background: transparent;
            border: 2px solid #3f6a84;
            color: #1d3f57;
        }
        .btn-success {
            background: #27ae60;
            color: white;
        }
        .btn-danger {
            background: #c0392b;
            color: white;
        }
        .btn-warning {
            background: #e67e22;
            color: white;
        }
        .flex-row {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }
        .flex-row .btn {
            flex: 1;
        }
        .msg-box {
            text-align: center;
            margin-top: 14px;
            padding: 10px;
            border-radius: 16px;
            font-size: 14px;
            min-height: 20px;
        }
        .msg-error {
            color: #c0392b;
            background: #fde8e8;
        }
        .msg-success {
            color: #27ae60;
            background: #e8f8ed;
        }
        .hidden {
            display: none !important;
        }
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .balance-badge {
            background: #1a3a4a;
            color: white;
            padding: 6px 16px;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 600;
        }
        .divider {
            border: none;
            border-top: 2px dashed #b7cdde;
            margin: 18px 0;
        }
        .grid-2col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .log-area {
            background: #edf4fa;
            border-radius: 20px;
            padding: 12px 16px;
            max-height: 200px;
            overflow-y: auto;
            font-size: 14px;
            border: 1px solid #c8dbe9;
            margin-top: 8px;
        }
        .log-entry {
            padding: 6px 0;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            color: #14303f;
            font-size: 13px;
            word-break: break-all;
        }
        .log-entry:last-child {
            border-bottom: none;
        }
        .admin-panel {
            background: #dce6ef;
            border-radius: 28px;
            padding: 16px;
            margin-top: 16px;
            border: 1px solid #b1cada;
        }
        .admin-panel .admin-section {
            background: rgba(255,255,255,0.5);
            border-radius: 16px;
            padding: 12px;
            margin-top: 10px;
        }
        .admin-panel .admin-section:first-of-type {
            margin-top: 0;
        }
        .admin-panel .admin-section-title {
            font-size: 13px;
            font-weight: 600;
            color: #1a2e3f;
            margin-bottom: 8px;
        }
        .small-note {
            font-size: 12px;
            opacity: 0.6;
            margin-top: 12px;
            text-align: center;
        }
        .bank-container {
            max-width: 500px;
            width: 100%;
            background: rgba(255,255,255,0.92);
            border-radius: 32px;
            padding: 24px 20px 28px;
            box-shadow: 0 20px 40px rgba(0,20,40,0.2);
        }
        .bank-container .logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .bank-container .logo svg {
            width: 36px;
            height: 36px;
        }
        .bank-container .logo h1 {
            font-size: 20px;
            margin: 0;
            color: #1a2e3f;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .btn-sm {
            padding: 6px 16px;
            width: auto;
            font-size: 13px;
        }
        .user-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 10px;
            background: white;
            border-radius: 12px;
            margin-bottom: 4px;
            font-size: 14px;
        }
        .user-list-item .user-name {
            font-weight: 500;
            color: #1a2e3f;
        }
        .user-list-item .user-balance {
            color: #1d3f57;
            font-weight: 600;
        }
        .loading-text {
            font-size: 13px;
            color: #6a7f8f;
            text-align: center;
            padding: 10px;
        }
        @media (max-width: 480px) {
            .auth-container { padding: 24px 18px 28px; }
            .bank-container { padding: 18px 14px 22px; }
            .grid-2col { grid-template-columns: 1fr; gap: 4px; }
            .flex-row { flex-wrap: wrap; }
            .flex-row .btn { flex: 1 1 40%; }
            .bank-container .logo h1 { font-size: 17px; }
            .bank-container .logo svg { width: 28px; height: 28px; }
            .auth-container .logo svg { width: 48px; height: 48px; }
        }
    </style>
</head>
<body>

<!-- ===== 登录/注册界面 ===== -->

                <rect x="42" y="65" width="16" height="20" fill="#d4a373" stroke="#b8895a" stroke-width="1.5"/>

<script>
    // ============================================================
    //  Supabase 配置
    // ============================================================
    const SUPABASE_URL = 'https://qldweqlfbyjzbkzzwgyq.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFsZHdlcWxmYnlqemJrenp3Z3lxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5NDgyODIsImV4cCI6MjA5OTUyNDI4Mn0.f3ziLdorl8X5LciEbtZ93eB1SSfToLBSVxbe-9yRVDI';

    // ============================================================
    //  数据层
    // ============================================================
    let currentUser = null;

    // ---- 辅助函数：调用 Supabase API ----
    async function supabaseRequest(method, table, body, query) {
        let url = SUPABASE_URL + '/rest/v1/' + table;
        if (query) {
            url += '?' + new URLSearchParams(query).toString();
        }
        const headers = {
            'apikey': SUPABASE_KEY,
            'Authorization': 'Bearer ' + SUPABASE_KEY,
            'Content-Type': 'application/json'
        };
        const options = {
            method: method,
            headers: headers
        };
        if (body) {
            options.body = JSON.stringify(body);
        }
        const response = await fetch(url, options);
        if (!response.ok) {
            const errorText = await response.text();
            throw new Error(errorText || '请求失败');
        }
        if (method === 'DELETE') {
            return { success: true };
        }
        return await response.json();
    }

    // ---- 用户操作 ----
    async function getUser(username) {
        const results = await supabaseRequest('GET', 'users', null, { username: `eq.${username}` });
        return results && results.length > 0 ? results[0] : null;
    }

    async function userExists(username) {
        const user = await getUser(username);
        return !!user;
    }

    async function createUser(username, password) {
        const body = {
            username: username,
            password: password,
            balance: 100
        };
        await supabaseRequest('POST', 'users', body);
        // 添加开户交易记录
        await addTransaction(username, '开户', 100, '系统');
        return { success: true };
    }

    async function addTransaction(username, type, amount, target) {
        const body = {
            username: username,
            type: type,
            amount: typeof amount === 'number' ? amount : parseFloat(amount) || 0,
            target: target || '系统',
            time: new Date().toLocaleString()
        };
        await supabaseRequest('POST', 'transactions', body);
    }

    async function getAllUsers() {
        const results = await supabaseRequest('GET', 'users', null, { select: 'username,balance' });
        return results.map(u => ({
            name: u.username,
            balance: u.balance || 0
        }));
    }

    async function getTransactions(username) {
        const results = await supabaseRequest('GET', 'transactions', null, { username: `eq.${username}`, select: 'type,amount,target,time' });
        return results || [];
    }

    // ---- 普通转账 ----
    async function userTransfer(from, to, amount) {
        amount = parseFloat(amount);
        if (isNaN(amount) || amount <= 0) return { success: false, msg: '⚠️ 金额必须大于0' };
        if (!(await userExists(to))) return { success: false, msg: '⚠️ 目标用户不存在' };
        if (from === to) return { success: false, msg: '⚠️ 不能转给自己' };
        const fromUser = await getUser(from);
        if (!fromUser) return { success: false, msg: '⚠️ 账户异常' };
        if (fromUser.balance < amount) return { success: false, msg: '⚠️ 余额不足' };

        // 扣款
        const newFromBalance = Math.round((fromUser.balance - amount) * 100) / 100;
        await supabaseRequest('PATCH', 'users', { balance: newFromBalance }, { username: `eq.${from}` });

        // 收款
        const toUser = await getUser(to);
        const newToBalance = Math.round((toUser.balance + amount) * 100) / 100;
        await supabaseRequest('PATCH', 'users', { balance: newToBalance }, { username: `eq.${to}` });

        await addTransaction(from, '转账支出', amount, to);
        await addTransaction(to, '转账收入', amount, from);

        return { success: true, msg: '✅ 转账 ' + amount.toFixed(2) + ' 给 ' + to + ' 成功' };
    }

    // ---- 管理员加钱 ----
    async function adminTransfer(toUsername, amount) {
        amount = parseFloat(amount);
        if (isNaN(amount) || amount <= 0) return { success: false, msg: '⚠️ 金额必须大于0' };
        if (!(await userExists(toUsername))) return { success: false, msg: '⚠️ 目标用户不存在' };
        const targetUser = await getUser(toUsername);
        const newBalance = Math.round(((targetUser.balance || 0) + amount) * 100) / 100;
        await supabaseRequest('PATCH', 'users', { balance: newBalance }, { username: `eq.${toUsername}` });
        await addTransaction(toUsername, '管理员加钱', amount, '管理员');
        return { success: true, msg: '✅ 成功给 ' + toUsername + ' 加钱 ' + amount.toFixed(2) };
    }

    // ---- 管理员扣减 ----
    async function adminDeduct(fromUsername, amount) {
        amount = parseFloat(amount);
        if (isNaN(amount) || amount <= 0) return { success: false, msg: '⚠️ 扣减金额必须大于0' };
        if (!(await userExists(fromUsername))) return { success: false, msg: '⚠️ 目标用户不存在' };
        const targetUser = await getUser(fromUsername);
        if (targetUser.balance < amount) {
            return { success: false, msg: '⚠️ 用户 ' + fromUsername + ' 余额不足（当前 ' + targetUser.balance.toFixed(2) + '）' };
        }
        const newBalance = Math.round((targetUser.balance - amount) * 100) / 100;
        await supabaseRequest('PATCH', 'users', { balance: newBalance }, { username: `eq.${fromUsername}` });
        await addTransaction(fromUsername, '管理员扣款', amount, '管理员扣减');
        return { success: true, msg: '✅ 成功从 ' + fromUsername + ' 扣减 ' + amount.toFixed(2) + '，剩余 ' + newBalance.toFixed(2) };
    }

    // ---- 删除用户 ----
    async function deleteUser(username) {
        if (!(await userExists(username))) return { success: false, msg: '⚠️ 用户不存在' };
        if (username === currentUser) return { success: false, msg: '⚠️ 不能删除自己（当前登录用户）' };
        await supabaseRequest('DELETE', 'users', null, { username: `eq.${username}` });
        return { success: true, msg: '✅ 用户 ' + username + ' 已删除' };
    }

    // ============================================================
    //  UI 渲染
    // ============================================================
    async function renderBalance() {
        if (currentUser) {
            const user = await getUser(currentUser);
            if (user) {
                document.getElementById('balanceDisplay').textContent = '💰 ' + user.balance.toFixed(2);
                document.getElementById('currentUserDisplay').textContent = currentUser;
            }
        }
    }

    async function renderLogs(username) {
        const container = document.getElementById('logContainer');
        const transactions = await getTransactions(username);
        if (!transactions || transactions.length === 0) {
            container.innerHTML = '<div class="log-entry" style="opacity:0.5;">—— 暂无记录 ——</div>';
            return;
        }
        const logs = transactions.slice().reverse().slice(0, 15);
        container.innerHTML = logs.map(function(entry) {
            var sign = entry.type.includes('收入') || entry.type.includes('加钱') ? '+' : (entry.type.includes('支出') || entry.type.includes('扣款') ? '-' : '');
            return '<div class="log-entry">[' + entry.time + '] ' + entry.type + ' ' + sign + entry.amount.toFixed(2) + ' ' + (entry.target ? '→ ' + entry.target : '') + '</div>';
        }).join('');
    }

    async function renderUserList() {
        var container = document.getElementById('userListContainer');
        try {
            var users = await getAllUsers();
            if (users.length === 0) {
                container.innerHTML = '<div style="font-size:13px; color:#6a7f8f;">暂无用户</div>';
                return;
            }
            container.innerHTML = users.map(function(u) {
                return '<div class="user-list-item"><span class="user-name">👤 ' + u.name + '</span><span class="user-balance">💰 ' + u.balance.toFixed(2) + '</span></div>';
            }).join('');
        } catch(e) {
            container.innerHTML = '<div style="font-size:13px; color:#c0392b;">加载失败，请刷新重试</div>';
        }
    }

    async function refreshUI() {
        await renderBalance();
        if (currentUser) {
            await renderLogs(currentUser);
        }
        if (document.getElementById('adminContent').style.display !== 'none') {
            await renderUserList();
        }
    }

    function showAuthPage() {
        document.getElementById('authPage').classList.remove('hidden');
        document.getElementById('bankPage').classList.add('hidden');
        var msg = document.getElementById('authMsg');
        msg.textContent = '';
        msg.className = 'msg-box';
    }

    function showBankPage() {
        document.getElementById('authPage').classList.add('hidden');
        document.getElementById('bankPage').classList.remove('hidden');
        refreshUI();
        document.getElementById('adminContent').style.display = 'none';
        document.getElementById('adminFeedback').textContent = '';
        document.getElementById('adminDeductResult').textContent = '';
        document.getElementById('adminPasswordInput').value = '';
        document.getElementById('transferMsg').textContent = '';
        document.getElementById('transferMsg').className = 'msg-box';
    }

    function showAuthMsg(text, isError) {
        var el = document.getElementById('authMsg');
        el.textContent = text;
        el.className = 'msg-box ' + (isError !== false ? 'msg-error' : 'msg-success');
    }

    function showTransferMsg(text, isError) {
        var el = document.getElementById('transferMsg');
        el.textContent = text;
        el.className = 'msg-box ' + (isError !== false ? 'msg-error' : 'msg-success');
    }

    // ============================================================
    //  事件绑定
    // ============================================================

    // ---- 注册 ----
    document.getElementById('authRegisterBtn').addEventListener('click', async function(e) {
        e.preventDefault();
        var uname = document.getElementById('authUsername').value.trim();
        var pwd = document.getElementById('authPassword').value.trim();

        if (!uname || !pwd) {
            showAuthMsg('⚠️ 账户名和密码不能为空');
            return;
        }
        if (await userExists(uname)) {
            showAuthMsg('⚠️ 账户名 "' + uname + '" 已被占用');
            return;
        }

        try {
            await createUser(uname, pwd);
            showAuthMsg('✅ 注册成功！账户: ' + uname + '，初始余额 100', false);
            currentUser = uname;
            setTimeout(function() {
                showBankPage();
            }, 400);
        } catch(e) {
            showAuthMsg('⚠️ 注册失败，请重试');
        }
    });

    // ---- 登录 ----
    document.getElementById('authLoginBtn').addEventListener('click', async function(e) {
        e.preventDefault();
        var uname = document.getElementById('authUsername').value.trim();
        var pwd = document.getElementById('authPassword').value.trim();

        if (!uname || !pwd) {
            showAuthMsg('⚠️ 请输入账户名和密码');
            return;
        }

        try {
            var user = await getUser(uname);
            if (!user) {
                showAuthMsg('⚠️ 用户 "' + uname + '" 不存在');
                return;
            }
            if (user.password !== pwd) {
                showAuthMsg('⚠️ 密码错误');
                return;
            }

            showAuthMsg('✅ 登录成功！', false);
            currentUser = uname;
            setTimeout(function() {
                showBankPage();
            }, 300);
        } catch(e) {
            showAuthMsg('⚠️ 登录失败，请重试');
        }
    });

    // ---- 回车键 ----
    document.getElementById('authPassword').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') document.getElementById('authLoginBtn').click();
    });
    document.getElementById('authUsername').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') document.getElementById('authLoginBtn').click();
    });

    // ---- 退出 ----
    document.getElementById('bankLogoutBtn').addEventListener('click', function() {
        currentUser = null;
        showAuthPage();
        document.getElementById('authPassword').value = '';
        document.getElementById('authUsername').value = '';
        showAuthMsg('已退出', false);
    });

    // ---- 转账 ----
    document.getElementById('transferBtn').addEventListener('click', async function() {
        var target = document.getElementById('transferTarget').value.trim();
        var amount = parseFloat(document.getElementById('transferAmount').value);

        if (!target) {
            showTransferMsg('⚠️ 请输入目标账户名');
            return;
        }
        if (isNaN(amount) || amount <= 0) {
            showTransferMsg('⚠️ 请输入有效金额');
            return;
        }

        try {
            var result = await userTransfer(currentUser, target, amount);
            showTransferMsg(result.msg, !result.success);
            if (result.success) {
                await refreshUI();
                document.getElementById('transferTarget').value = '';
                document.getElementById('transferAmount').value = '';
            }
        } catch(e) {
            showTransferMsg('⚠️ 转账失败，请重试');
        }
    });

    // ---- 刷新 ----
    document.getElementById('refreshLogBtn').addEventListener('click', async function() {
        if (currentUser) await refreshUI();
    });

    // ============================================================
    //  管理员功能
    // ============================================================

    document.getElementById('adminUnlockBtn').addEventListener('click', function() {
        var pwd = document.getElementById('adminPasswordInput').value.trim();
        var feedback = document.getElementById('adminFeedback');
        if (pwd === '911') {
            document.getElementById('adminContent').style.display = 'block';
            feedback.textContent = '✅ 管理员模式已激活 (无限资产)';
            feedback.style.color = '#27ae60';
            document.getElementById('adminPasswordInput').value = '';
            renderUserList();
        } else {
            feedback.textContent = '❌ 密码错误';
            feedback.style.color = '#c0392b';
            document.getElementById('adminContent').style.display = 'none';
        }
    });

    document.getElementById('adminRefreshUsersBtn').addEventListener('click', async function() {
        await renderUserList();
        document.getElementById('adminFeedback').textContent = '✅ 用户列表已刷新';
        document.getElementById('adminFeedback').style.color = '#27ae60';
    });

    document.getElementById('adminViewLogBtn').addEventListener('click', async function() {
        var uname = document.getElementById('adminViewUser').value.trim();
        var resultEl = document.getElementById('adminViewLogResult');
        if (!uname) { resultEl.textContent = '⚠️ 请输入用户名'; return; }
        try {
            var user = await getUser(uname);
            if (!user) { resultEl.textContent = '⚠️ 用户不存在'; return; }
            var transactions = await getTransactions(uname);
            if (!transactions || transactions.length === 0) {
                resultEl.textContent = '📭 ' + uname + ' 无交易记录';
                return;
            }
            var logs = transactions.slice().reverse().slice(0, 10);
            var msg = '📋 ' + uname + ' 最近记录: ';
            logs.forEach(function(e, idx) {
                msg += e.time + ' ' + e.type + ' ' + e.amount.toFixed(2) + ' → ' + (e.target || '系统');
                if (idx < logs.length-1) msg += ' ; ';
            });
            resultEl.textContent = msg;
        } catch(e) {
            resultEl.textContent = '⚠️ 查询失败';
        }
    });

    document.getElementById('adminTransferBtn').addEventListener('click', async function() {
        var target = document.getElementById('adminTransferTarget').value.trim();
        var amount = parseFloat(document.getElementById('adminTransferAmount').value);
        var feedback = document.getElementById('adminFeedback');
        if (!target) { feedback.textContent = '⚠️ 请输入目标用户'; return; }
        if (isNaN(amount) || amount <= 0) { feedback.textContent = '⚠️ 请输入有效金额'; return; }
        try {
            var result = await adminTransfer(target, amount);
            feedback.textContent = result.msg;
            feedback.style.color = result.success ? '#27ae60' : '#c0392b';
            if (result.success) {
                await refreshUI();
                await renderUserList();
                document.getElementById('adminTransferTarget').value = '';
                document.getElementById('adminTransferAmount').value = '';
            }
        } catch(e) {
            feedback.textContent = '⚠️ 操作失败，请重试';
            feedback.style.color = '#c0392b';
        }
    });

    document.getElementById('adminDeductBtn').addEventListener('click', async function() {
        var target = document.getElementById('adminDeductTarget').value.trim();
        var amount = parseFloat(document.getElementById('adminDeductAmount').value);
        var resultEl = document.getElementById('adminDeductResult');
        if (!target) { resultEl.textContent = '⚠️ 请输入目标用户'; return; }
        if (isNaN(amount) || amount <= 0) { resultEl.textContent = '⚠️ 请输入有效金额'; return; }
        try {
            var result = await adminDeduct(target, amount);
            resultEl.textContent = result.msg;
            resultEl.style.color = result.success ? '#27ae60' : '#c0392b';
            if (result.success) {
                await refreshUI();
                await renderUserList();
                document.getElementById('adminDeductTarget').value = '';
                document.getElementById('adminDeductAmount').value = '';
            }
        } catch(e) {
            resultEl.textContent = '⚠️ 操作失败，请重试';
            resultEl.style.color = '#c0392b';
        }
    });

    document.getElementById('adminDeleteUserBtn').addEventListener('click', async function() {
        var uname = document.getElementById('adminDeleteUser').value.trim();
        var resultEl = document.getElementById('adminDeleteResult');
        if (!uname) { resultEl.textContent = '⚠️ 请输入要删除的用户名'; return; }
        if (!confirm('⚠️ 确定要删除用户 "' + uname + '" 吗？此操作不可恢复！')) {
            resultEl.textContent = '已取消删除';
            return;
        }
        try {
            var result = await deleteUser(uname);
            resultEl.textContent = result.msg;
            resultEl.style.color = result.success ? '#27ae60' : '#c0392b';
            if (result.success) {
                await refreshUI();
                await renderUserList();
                document.getElementById('adminDeleteUser').value = '';
            }
        } catch(e) {
            resultEl.textContent = '⚠️ 删除失败，请重试';
            resultEl.style.color = '#c0392b';
        }
    });

    // ---- 初始化 ----
    showAuthPage();
    document.getElementById('authUsername').value = '';
    document.getElementById('authPassword').value = '';
</script>
</body>
</html>
