<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>福克斯山银行</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #e9f0f5 0%, #d3dee8 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .auth-container {
            max-width: 420px;
            width: 100%;
            background: rgba(255,255,255,0.95);
            border-radius: 32px;
            padding: 36px 28px 32px;
            box-shadow: 0 20px 40px rgba(0,20,40,0.2);
        }
        .auth-container .logo { text-align: center; margin-bottom: 8px; }
        .auth-container .logo svg { width: 64px; height: 64px; }
        .auth-container h1 {
            font-size: 26px;
            color: #1a2e3f;
            text-align: center;
            margin-bottom: 4px;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .auth-container .subhead {
            color: #3e5a6b;
            font-size: 14px;
            text-align: center;
            margin-bottom: 28px;
            opacity: 0.7;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 16px;
        }
        .input-group label {
            font-size: 13px;
            font-weight: 600;
            color: #2b4b5e;
        }
        .input-group input {
            background: white;
            border: 1px solid #cbd9e5;
            border-radius: 40px;
            padding: 14px 18px;
            font-size: 16px;
            outline: none;
            width: 100%;
            transition: border-color 0.2s;
        }
        .input-group input:focus {
            border-color: #3f7b9e;
            box-shadow: 0 0 0 3px rgba(63, 123, 158, 0.2);
        }
        .btn {
            border: none;
            border-radius: 60px;
            padding: 14px 24px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: 0.15s;
            width: 100%;
            text-align: center;
        }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }
        .btn-primary { background: #1a3a4a; color: white; }
        .btn-primary:active:not(:disabled) { transform: scale(0.96); }
        .btn-outline { background: transparent; border: 2px solid #3f6a84; color: #1d3f57; }
        .btn-success { background: #27ae60; color: white; }
        .btn-danger { background: #c0392b; color: white; }
        .btn-warning { background: #e67e22; color: white; }
        .flex-row { display: flex; gap: 12px; margin-top: 8px; }
        .flex-row .btn { flex: 1; }
        .msg-box {
            text-align: center;
            margin-top: 14px;
            padding: 10px;
            border-radius: 16px;
            font-size: 14px;
            min-height: 20px;
            transition: opacity 0.3s;
        }
        .msg-error { color: #c0392b; background: #fde8e8; }
        .msg-success { color: #27ae60; background: #e8f8ed; }
        .hidden { display: none !important; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .balance-badge {
            background: #1a3a4a;
            color: white;
            padding: 6px 16px;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 600;
        }
        .divider { border: none; border-top: 2px dashed #b7cdde; margin: 18px 0; }
        .grid-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .log-area {
            background: #edf4fa;
            border-radius: 20px;
            padding: 12px 16px;
            max-height: 200px;
            overflow-y: auto;
            font-size: 14px;
            border: 1px solid #c8dbe9;
            margin-top: 8px;
        }
        .log-entry { padding: 6px 0; border-bottom: 1px solid rgba(0,0,0,0.05); color: #14303f; font-size: 13px; word-break: break-all; }
        .log-entry:last-child { border-bottom: none; }
        .admin-panel {
            background: #dce6ef;
            border-radius: 28px;
            padding: 16px;
            margin-top: 16px;
            border: 1px solid #b1cada;
        }
        .admin-panel .admin-section {
            background: rgba(255,255,255,0.5);
            border-radius: 16px;
            padding: 12px;
            margin-top: 10px;
        }
        .admin-panel .admin-section:first-of-type { margin-top: 0; }
        .admin-panel .admin-section-title {
            font-size: 13px;
            font-weight: 600;
            color: #1a2e3f;
            margin-bottom: 8px;
        }
        .small-note { font-size: 12px; opacity: 0.6; margin-top: 12px; text-align: center; }
        .bank-container {
            max-width: 500px;
            width: 100%;
            background: rgba(255,255,255,0.92);
            border-radius: 32px;
            padding: 24px 20px 28px;
            box-shadow: 0 20px 40px rgba(0,20,40,0.2);
        }
        .bank-container .logo { display: flex; align-items: center; gap: 8px; }
        .bank-container .logo svg { width: 36px; height: 36px; }
        .bank-container .logo h1 { font-size: 20px; margin: 0; color: #1a2e3f; font-weight: 700; letter-spacing: 1px; }
        .btn-sm { padding: 6px 16px; width: auto; font-size: 13px; }
        .user-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 10px;
            background: white;
            border-radius: 12px;
            margin-bottom: 4px;
            font-size: 14px;
        }
        .user-list-item .user-name { font-weight: 500; color: #1a2e3f; }
        .user-list-item .user-balance { color: #1d3f57; font-weight: 600; }
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top: 2px solid #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 480px) {
            .auth-container { padding: 24px 18px 28px; }
            .bank-container { padding: 18px 14px 22px; }
            .grid-2col { grid-template-columns: 1fr; gap: 4px; }
            .flex-row { flex-wrap: wrap; }
            .flex-row .btn { flex: 1 1 40%; }
            .bank-container .logo h1 { font-size: 17px; }
            .bank-container .logo svg { width: 28px; height: 28px; }
            .auth-container .logo svg { width: 48px; height: 48px; }
        }
    </style>
</head>
<body>

<script>
    // ============================================================
    //  Supabase 配置
    // ============================================================
    const SUPABASE_URL = 'https://qldweqlfbyjzbkzzwgyq.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFsZHdlcWxmYnlqemJrenp3Z3lxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5NDgyODIsImV4cCI6MjA5OTUyNDI4Mn0.f3ziLdorl8X5LciEbtZ93eB1SSfToLBSVxbe-9yRVDI';

    // ============================================================
    //  状态
    // ============================================================
    let currentUser = null;
    let isLoading = false;

    // ============================================================
    //  DOM 引用
    // ============================================================
    const $ = id => document.getElementById(id);

    // ============================================================
    //  UI 工具函数
    // ============================================================
    function setLoading(btnId, loading, text) {
        const btn = $(btnId);
        if (!btn) return;
        if (loading) {
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> ' + (text || '处理中...');
        } else {
            btn.disabled = false;
            const map = {
                'authLoginBtn': '🔓 登录',
                'authRegisterBtn': '📝 注册',
                'transferBtn': '💸 转账',
                'adminTransferBtn': '➕ 加钱',
                'adminDeductBtn': '➖ 扣减余额',
                'adminDeleteUserBtn': '🗑️ 删除',
                'adminViewLogBtn': '查看'
            };
            btn.textContent = map[btnId] || '按钮';
        }
    }

    function showMsg(elId, text, isError = true) {
        const el = $(elId);
        if (!el) return;
        el.textContent = text;
        el.className = 'msg-box ' + (isError ? 'msg-error' : 'msg-success');
        if (text && !isError) {
            clearTimeout(el._timer);
            el._timer = setTimeout(() => {
                el.style.opacity = '0';
                setTimeout(() => { el.textContent = ''; el.className = 'msg-box'; el.style.opacity = '1'; }, 300);
            }, 4000);
        }
    }

    // ============================================================
    //  Supabase 请求（核心修复）
    // ============================================================
    async function supabaseRequest(method, table, body, query) {
        let url = SUPABASE_URL + '/rest/v1/' + table;
        if (query) {
            const params = new URLSearchParams();
            for (let key in query) {
                if (query[key] !== undefined && query[key] !== null) {
                    params.append(key, query[key]);
                }
            }
            const qs = params.toString();
            if (qs) url += '?' + qs;
        }

        const headers = {
            'apikey': SUPABASE_KEY,
            'Authorization': 'Bearer ' + SUPABASE_KEY,
            'Content-Type': 'application/json',
            'Prefer': 'return=representation'  // 关键修复：让 POST/PATCH 返回数据
        };

        const options = { method, headers };
        if (body) options.body = JSON.stringify(body);

        const response = await fetch(url, options);
        if (!response.ok) {
            const errorText = await response.text();
            throw new Error(errorText || 'HTTP ' + response.status);
        }

        // 检查 Content-Length，如果为空则返回空数组
        const contentLength = response.headers.get('content-length');
        if (contentLength === '0' || response.status === 204) {
            return [];
        }

        try {
            return await response.json();
        } catch(e) {
            // 如果 JSON 解析失败，返回空数组
            console.warn('JSON 解析失败，返回空数组', e);
            return [];
        }
    }

    // ============================================================
    //  数据操作
    // ============================================================
    async function getUser(username) {
        if (!username) return null;
        const results = await supabaseRequest('GET', 'users', null, { username: 'eq.' + username });
        return results && results.length > 0 ? results[0] : null;
    }

    async function userExists(username) {
        const user = await getUser(username);
        return !!user;
    }

    async function createUser(username, password) {
        await supabaseRequest('POST', 'users', { username, password, balance: 100 });
        await supabaseRequest('POST', 'transactions', {
            username: username,
            type: '开户',
            amount: 100,
            target: '系统',
            time: new Date().toLocaleString()
        });
        return { success: true };
    }

    async function getAllUsers() {
        const results = await supabaseRequest('GET', 'users', null, { select: 'username,balance' });
        return results.map(u => ({ name: u.username, balance: u.balance || 0 }));
    }

    async function getTransactions(username) {
        const results = await supabaseRequest('GET', 'transactions', null, {
            username: 'eq.' + username,
            select: 'type,amount,target,time'
        });
        return results || [];
    }

    async function addTransaction(username, type, amount, target) {
        await supabaseRequest('POST', 'transactions', {
            username: username,
            type: type,
            amount: typeof amount === 'number' ? amount : parseFloat(amount) || 0,
            target: target || '系统',
            time: new Date().toLocaleString()
        });
    }

    async function updateBalance(username, newBalance) {
        await supabaseRequest('PATCH', 'users', { balance: newBalance }, { username: 'eq.' + username });
    }

    // ---- 转账 ----
    async function userTransfer(from, to, amount) {
        amount = parseFloat(amount);
        if (isNaN(amount) || amount <= 0) return { success: false, msg: '⚠️ 金额必须大于0' };
        if (from === to) return { success: false, msg: '⚠️ 不能转给自己' };

        const fromUser = await getUser(from);
        if (!fromUser) return { success: false, msg: '⚠️ 账户异常' };
        if (fromUser.balance < amount) return { success: false, msg: '⚠️ 余额不足' };

        const toUser = await getUser(to);
        if (!toUser) return { success: false, msg: '⚠️ 目标用户不存在' };

        const newFromBalance = Math.round((fromUser.balance - amount) * 100) / 100;
        const newToBalance = Math.round((toUser.balance + amount) * 100) / 100;

        await updateBalance(from, newFromBalance);
        await updateBalance(to, newToBalance);

        await addTransaction(from, '转账支出', amount, to);
        await addTransaction(to, '转账收入', amount, from);

        return { success: true, msg: '✅ 转账 ' + amount.toFixed(2) + ' 给 ' + to + ' 成功' };
    }

    // ---- 管理员加钱 ----
    async function adminTransfer(toUsername, amount) {
        amount = parseFloat(amount);
        if (isNaN(amount) || amount <= 0) return { success: false, msg: '⚠️ 金额必须大于0' };
        const targetUser = await getUser(toUsername);
        if (!targetUser) return { success: false, msg: '⚠️ 目标用户不存在' };
        const newBalance = Math.round(((targetUser.balance || 0) + amount) * 100) / 100;
        await updateBalance(toUsername, newBalance);
        await addTransaction(toUsername, '管理员加钱', amount, '管理员');
        return { success: true, msg: '✅ 成功给 ' + toUsername + ' 加钱 ' + amount.toFixed(2) };
    }

    // ---- 管理员扣减 ----
    async function adminDeduct(fromUsername, amount) {
        amount = parseFloat(amount);
        if (isNaN(amount) || amount <= 0) return { success: false, msg: '⚠️ 扣减金额必须大于0' };
        const targetUser = await getUser(fromUsername);
        if (!targetUser) return { success: false, msg: '⚠️ 目标用户不存在' };
        if (targetUser.balance < amount) {
            return { success: false, msg: '⚠️ 用户 ' + fromUsername + ' 余额不足（当前 ' + targetUser.balance.toFixed(2) + '）' };
        }
        const newBalance = Math.round((targetUser.balance - amount) * 100) / 100;
        await updateBalance(fromUsername, newBalance);
        await addTransaction(fromUsername, '管理员扣款', amount, '管理员扣减');
        return { success: true, msg: '✅ 成功从 ' + fromUsername + ' 扣减 ' + amount.toFixed(2) + '，剩余 ' + newBalance.toFixed(2) };
    }

    // ---- 删除用户 ----
    async function deleteUser(username) {
        if (!(await userExists(username))) return { success: false, msg: '⚠️ 用户不存在' };
        if (username === currentUser) return { success: false, msg: '⚠️ 不能删除自己' };
        await supabaseRequest('DELETE', 'users', null, { username: 'eq.' + username });
        return { success: true, msg: '✅ 用户 ' + username + ' 已删除' };
    }

    // ============================================================
    //  UI 渲染
    // ============================================================
    async function renderBalance() {
        if (!currentUser) return;
        try {
            const user = await getUser(currentUser);
            if (user) {
                $('balanceDisplay').textContent = '💰 ' + user.balance.toFixed(2);
                $('currentUserDisplay').textContent = currentUser;
            }
        } catch(e) { console.warn('渲染余额失败', e); }
    }

    async function renderLogs(username) {
        const container = $('logContainer');
        try {
            const transactions = await getTransactions(username);
            if (!transactions || transactions.length === 0) {
                container.innerHTML = '<div class="log-entry" style="opacity:0.5;">—— 暂无记录 ——</div>';
                return;
            }
            const logs = transactions.slice().reverse().slice(0, 15);
            container.innerHTML = logs.map(entry => {
                let sign = '';
                if (entry.type.includes('收入') || entry.type.includes('加钱')) sign = '+';
                else if (entry.type.includes('支出') || entry.type.includes('扣款')) sign = '-';
                return '<div class="log-entry">[' + entry.time + '] ' + entry.type +
                       ' ' + sign + entry.amount.toFixed(2) +
                       (entry.target ? ' → ' + entry.target : '') + '</div>';
            }).join('');
        } catch(e) {
            container.innerHTML = '<div class="log-entry" style="color:#c0392b;">⚠️ 加载记录失败: ' + e.message + '</div>';
        }
    }

    async function renderUserList() {
        const container = $('userListContainer');
        try {
            const users = await getAllUsers();
            if (users.length === 0) {
                container.innerHTML = '<div style="font-size:13px; color:#6a7f8f;">暂无用户</div>';
                return;
            }
            container.innerHTML = users.map(u =>
                '<div class="user-list-item"><span class="user-name">👤 ' + u.name +
                '</span><span class="user-balance">💰 ' + u.balance.toFixed(2) + '</span></div>'
            ).join('');
        } catch(e) {
            container.innerHTML = '<div style="font-size:13px; color:#c0392b;">加载失败: ' + e.message + '</div>';
        }
    }

    async function refreshUI() {
        await renderBalance();
        if (currentUser) await renderLogs(currentUser);
        if ($('adminContent').style.display !== 'none') await renderUserList();
    }

    function showAuthPage() {
        $('authPage').classList.remove('hidden');
        $('bankPage').classList.add('hidden');
        $('authMsg').textContent = '';
        $('authMsg').className = 'msg-box';
    }

    function showBankPage() {
        $('authPage').classList.add('hidden');
        $('bankPage').classList.remove('hidden');
        refreshUI();
        $('adminContent').style.display = 'none';
        $('adminFeedback').textContent = '';
        $('adminDeductResult').textContent = '';
        $('adminPasswordInput').value = '';
        $('transferMsg').textContent = '';
        $('transferMsg').className = 'msg-box';
    }

    // ============================================================
    //  事件绑定
    // ============================================================

    // ---- 注册 ----
    $('authRegisterBtn').addEventListener('click', async function(e) {
        e.preventDefault();
        if (isLoading) return;
        isLoading = true;
        setLoading('authRegisterBtn', true);

        const uname = $('authUsername').value.trim();
        const pwd = $('authPassword').value.trim();

        try {
            if (!uname || !pwd) { showMsg('authMsg', '⚠️ 账户名和密码不能为空'); return; }
            if (await userExists(uname)) { showMsg('authMsg', '⚠️ 账户名 "' + uname + '" 已被占用'); return; }
            await createUser(uname, pwd);
            showMsg('authMsg', '✅ 注册成功！账户: ' + uname + '，初始余额 100', false);
            currentUser = uname;
            showBankPage();
        } catch(e) {
            showMsg('authMsg', '⚠️ 注册失败: ' + e.message);
        } finally {
            isLoading = false;
            setLoading('authRegisterBtn', false);
        }
    });

    // ---- 登录 ----
    $('authLoginBtn').addEventListener('click', async function(e) {
        e.preventDefault();
        if (isLoading) return;
        isLoading = true;
        setLoading('authLoginBtn', true);

        const uname = $('authUsername').value.trim();
        const pwd = $('authPassword').value.trim();

        try {
            if (!uname || !pwd) { showMsg('authMsg', '⚠️ 请输入账户名和密码'); return; }
            const user = await getUser(uname);
            if (!user) { showMsg('authMsg', '⚠️ 用户 "' + uname + '" 不存在'); return; }
            if (user.password !== pwd) { showMsg('authMsg', '⚠️ 密码错误'); return; }
            showMsg('authMsg', '✅ 登录成功！', false);
            currentUser = uname;
            showBankPage();
        } catch(e) {
            showMsg('authMsg', '⚠️ 登录失败: ' + e.message);
        } finally {
            isLoading = false;
            setLoading('authLoginBtn', false);
        }
    });

    // ---- 回车键 ----
    $('authPassword').addEventListener('keypress', e => { if (e.key === 'Enter') $('authLoginBtn').click(); });
    $('authUsername').addEventListener('keypress', e => { if (e.key === 'Enter') $('authLoginBtn').click(); });

    // ---- 退出 ----
    $('bankLogoutBtn').addEventListener('click', function() {
        currentUser = null;
        showAuthPage();
        $('authPassword').value = '';
        $('authUsername').value = '';
        showMsg('authMsg', '已退出', false);
    });

    // ---- 转账 ----
    $('transferBtn').addEventListener('click', async function() {
        if (isLoading) return;
        isLoading = true;
        setLoading('transferBtn', true);

        const target = $('transferTarget').value.trim();
        const amount = parseFloat($('transferAmount').value);

        try {
            if (!target) { showMsg('transferMsg', '⚠️ 请输入目标账户名'); return; }
            if (isNaN(amount) || amount <= 0) { showMsg('transferMsg', '⚠️ 请输入有效金额'); return; }
            const result = await userTransfer(currentUser, target, amount);
            showMsg('transferMsg', result.msg, !result.success);
            if (result.success) {
                await refreshUI();
                $('transferTarget').value = '';
                $('transferAmount').value = '';
            }
        } catch(e) {
            showMsg('transferMsg', '⚠️ 转账失败: ' + e.message);
        } finally {
            isLoading = false;
            setLoading('transferBtn', false);
        }
    });

    // ---- 刷新 ----
    $('refreshLogBtn').addEventListener('click', async function() {
        if (currentUser) await refreshUI();
        showMsg('transferMsg', '✅ 已刷新', false);
        setTimeout(() => { $('transferMsg').textContent = ''; $('transferMsg').className = 'msg-box'; }, 1500);
    });

    // ============================================================
    //  管理员
    // ============================================================

    $('adminUnlockBtn').addEventListener('click', function() {
        const pwd = $('adminPasswordInput').value.trim();
        const feedback = $('adminFeedback');
        if (pwd === '911') {
            $('adminContent').style.display = 'block';
            feedback.textContent = '✅ 管理员模式已激活';
            feedback.style.color = '#27ae60';
            $('adminPasswordInput').value = '';
            renderUserList();
        } else {
            feedback.textContent = '❌ 密码错误';
            feedback.style.color = '#c0392b';
            $('adminContent').style.display = 'none';
        }
    });

    $('adminRefreshUsersBtn').addEventListener('click', async function() {
        await renderUserList();
        $('adminFeedback').textContent = '✅ 用户列表已刷新';
        $('adminFeedback').style.color = '#27ae60';
    });

    $('adminViewLogBtn').addEventListener('click', async function() {
        const uname = $('adminViewUser').value.trim();
        const resultEl = $('adminViewLogResult');
        if (!uname) { resultEl.textContent = '⚠️ 请输入用户名'; return; }
        try {
            const user = await getUser(uname);
            if (!user) { resultEl.textContent = '⚠️ 用户不存在'; return; }
            const transactions = await getTransactions(uname);
            if (!transactions || transactions.length === 0) {
                resultEl.textContent = '📭 ' + uname + ' 无交易记录';
                return;
            }
            const logs = transactions.slice().reverse().slice(0, 10);
            let msg = '📋 ' + uname + ' 最近记录: ';
            logs.forEach((e, idx) => {
                msg += e.time + ' ' + e.type + ' ' + e.amount.toFixed(2) + ' → ' + (e.target || '系统');
                if (idx < logs.length - 1) msg += ' ; ';
            });
            resultEl.textContent = msg;
        } catch(e) {
            resultEl.textContent = '⚠️ 查询失败: ' + e.message;
        }
    });

    $('adminTransferBtn').addEventListener('click', async function() {
        if (isLoading) return;
        isLoading = true;
        setLoading('adminTransferBtn', true);
        const target = $('adminTransferTarget').value.trim();
        const amount = parseFloat($('adminTransferAmount').value);
        const feedback = $('adminFeedback');
        try {
            if (!target) { feedback.textContent = '⚠️ 请输入目标用户'; return; }
            if (isNaN(amount) || amount <= 0) { feedback.textContent = '⚠️ 请输入有效金额'; return; }
            const result = await adminTransfer(target, amount);
            feedback.textContent = result.msg;
            feedback.style.color = result.success ? '#27ae60' : '#c0392b';
            if (result.success) { await refreshUI(); await renderUserList(); $('adminTransferTarget').value = ''; $('adminTransferAmount').value = ''; }
        } catch(e) {
            feedback.textContent = '⚠️ 操作失败: ' + e.message;
            feedback.style.color = '#c0392b';
        } finally {
            isLoading = false;
            setLoading('adminTransferBtn', false);
        }
    });

    $('adminDeductBtn').addEventListener('click', async function() {
        if (isLoading) return;
        isLoading = true;
        setLoading('adminDeductBtn', true);
        const target = $('adminDeductTarget').value.trim();
        const amount = parseFloat($('adminDeductAmount').value);
        const resultEl = $('adminDeductResult');
        try {
            if (!target) { resultEl.textContent = '⚠️ 请输入目标用户'; return; }
            if (isNaN(amount) || amount <= 0) { resultEl.textContent = '⚠️ 请输入有效金额'; return; }
            const result = await adminDeduct(target, amount);
            resultEl.textContent = result.msg;
            resultEl.style.color = result.success ? '#27ae60' : '#c0392b';
            if (result.success) { await refreshUI(); await renderUserList(); $('adminDeductTarget').value = ''; $('adminDeductAmount').value = ''; }
        } catch(e) {
            resultEl.textContent = '⚠️ 操作失败: ' + e.message;
            resultEl.style.color = '#c0392b';
        } finally {
            isLoading = false;
            setLoading('adminDeductBtn', false);
        }
    });

    $('adminDeleteUserBtn').addEventListener('click', async function() {
        if (isLoading) return;
        const uname = $('adminDeleteUser').value.trim();
        const resultEl = $('adminDeleteResult');
        if (!uname) { resultEl.textContent = '⚠️ 请输入要删除的用户名'; return; }
        if (!confirm('⚠️ 确定要删除用户 "' + uname + '" 吗？此操作不可恢复！')) {
            resultEl.textContent = '已取消删除';
            return;
        }
        isLoading = true;
        setLoading('adminDeleteUserBtn', true);
        try {
            const result = await deleteUser(uname);
            resultEl.textContent = result.msg;
            resultEl.style.color = result.success ? '#27ae60' : '#c0392b';
            if (result.success) { await refreshUI(); await renderUserList(); $('adminDeleteUser').value = ''; }
        } catch(e) {
            resultEl.textContent = '⚠️ 删除失败: ' + e.message;
            resultEl.style.color = '#c0392b';
        } finally {
            isLoading = false;
            setLoading('adminDeleteUserBtn', false);
        }
    });

    // ---- 初始化 ----
    showAuthPage();
    $('authUsername').value = '';
    $('authPassword').value = '';
</script>
</body>
</html>
